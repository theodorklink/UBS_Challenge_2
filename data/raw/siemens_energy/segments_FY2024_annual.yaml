notes: |
  - Verify segment revenues sum to group revenue (allow 1-2% tolerance
    for inter-segment elimination).
  - "Adjusted EBITA" is Siemens Energy's preferred profitability metric;
    do not substitute "EBITDA" or "operating profit" — they are
